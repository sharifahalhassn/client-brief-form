<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان تحديد نطاق المشروع</title>
</head>
<body style="margin:0;">
<div id="scope-app"></div>
<style>
  #scope-app, #scope-app * { box-sizing: border-box; }
  #scope-app {
    --ink: #1B2340;
    --ink-soft: #4A5178;
    --paper: #F1EFF7;
    --card: #FFFFFF;
    --line: #DAD7E8;
    --amber: #E0932F;
    --amber-deep: #B5701A;
    --teal: #3F7C74;
    --danger: #C4544A;
    font-family: 'IBM Plex Sans Arabic', 'Segoe UI', sans-serif;
    direction: rtl;
    background: var(--paper);
    color: var(--ink);
    padding: 0;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    min-height: 600px;
  }

  #scope-app .rail {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--ink);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #scope-app .rail-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  #scope-app .rail-fill {
    position: absolute;
    inset: 0 auto 0 0;
    background: linear-gradient(90deg, var(--amber-deep), var(--amber));
    width: 0%;
    border-radius: 4px;
    transition: width .4s ease;
  }
  #scope-app .rail-label {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: .3px;
    min-width: 90px;
    text-align: left;
  }

  #scope-app .hero {
    padding: 34px 28px 22px;
    background: var(--ink);
    color: #fff;
    position: relative;
  }
  #scope-app .hero::after {
    content: "";
    position: absolute;
    right: 0; bottom: 0; left: 0;
    height: 14px;
    background: repeating-linear-gradient(90deg, var(--amber) 0 2px, transparent 2px 14px);
    opacity: .55;
  }
  #scope-app .eyebrow {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 700;
    margin-bottom: 10px;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
  }
  #scope-app h1 {
    font-family: 'Almarai', sans-serif;
    font-size: 30px;
    font-weight: 800;
    margin: 0 0 8px;
    line-height: 1.35;
  }
  #scope-app .hero p {
    margin: 0;
    color: #C9CCE0;
    font-size: 14.5px;
    line-height: 1.9;
    max-width: 620px;
  }

  #scope-app .body-scroll {
    max-height: 640px;
    overflow-y: auto;
    padding: 26px 28px 10px;
  }

  #scope-app .section {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 18px;
    position: relative;
  }
  #scope-app .section.done { border-color: var(--teal); }
  #scope-app .section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  #scope-app .section-index {
    font-family: 'Almarai', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: var(--amber-deep);
    background: #FBEEDC;
    border-radius: 6px;
    padding: 3px 9px;
  }
  #scope-app .section-title {
    font-family: 'Almarai', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
  }

  #scope-app .q { margin-bottom: 16px; }
  #scope-app .q:last-child { margin-bottom: 0; }
  #scope-app .q label {
    display: block;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  #scope-app .q .hint {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-style: normal;
  }
  #scope-app input[type="text"], #scope-app textarea {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 9px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: #FCFBFE;
    resize: vertical;
    transition: border-color .15s;
  }
  #scope-app input[type="text"]:focus, #scope-app textarea:focus {
    outline: none;
    border-color: var(--amber);
    background: #fff;
  }
  #scope-app textarea { min-height: 64px; }

  #scope-app .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  #scope-app .chip {
    border: 1.5px solid var(--line);
    background: #FCFBFE;
    color: var(--ink-soft);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all .12s;
  }
  #scope-app .chip:hover { border-color: var(--amber); }
  #scope-app .chip.sel {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  #scope-app .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  #scope-app .opt {
    border: 1.5px solid var(--line);
    background: #FCFBFE;
    padding: 8px 14px;
    border-radius: 9px;
    font-size: 13.5px;
    cursor: pointer;
    color: var(--ink-soft);
  }
  #scope-app .opt.sel {
    background: #FBEEDC;
    border-color: var(--amber);
    color: var(--amber-deep);
    font-weight: 700;
  }

  #scope-app .footer {
    padding: 20px 28px 26px;
    background: #fff;
    border-top: 1px solid var(--line);
  }
  #scope-app .btn {
    font-family: inherit;
    font-weight: 700;
    font-size: 14.5px;
    border: none;
    border-radius: 10px;
    padding: 13px 22px;
    cursor: pointer;
    transition: transform .1s, opacity .15s;
  }
  #scope-app .btn:active { transform: scale(.98); }
  #scope-app .btn-primary {
    background: var(--ink);
    color: #fff;
    width: 100%;
  }
  #scope-app .btn-primary:hover { background: #2a3358; }
  #scope-app .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

  #scope-app .result {
    display: none;
    margin-top: 16px;
  }
  #scope-app .result.show { display: block; }
  #scope-app .result textarea {
    min-height: 220px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    direction: rtl;
  }
  #scope-app .copy-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  #scope-app .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--ink);
    flex: 1;
  }
  #scope-app .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    z-index: 999;
  }
  #scope-app .toast.show { opacity: 1; }

  @media (max-width: 520px) {
    #scope-app h1 { font-size: 24px; }
    #scope-app .hero, #scope-app .body-scroll, #scope-app .footer { padding-left: 16px; padding-right: 16px; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
(function(){
  const e = React.createElement;
  const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxvZKPbQXTmaDcDI0M8SQ_0Yn93S_yScCcri3Y-H1bvjbwrPgrW9frEpdwLTBNToeRBHQ/exec";

  const SECTIONS = [
    {
      title: "بريف المشروع",
      questions: [
        { id: "overview", label: "نبذة عن المشروع أو الفكرة العامة", type: "textarea", required: true },
        { id: "audience", label: "الفئة المستهدفة (العمر، الاهتمامات، طبيعة الاستخدام)", type: "textarea" },
        { id: "competitors", label: "المنافسون المباشرون (أسماء تطبيقات/مواقع مشابهة)", type: "text", required: true },
      ]
    },
    {
      title: "نوع المشروع",
      questions: [
        { id: "type", label: "نوع المشروع", type: "options", required: true,
          options: ["تطبيق موبايل", "ويب أبلكيشن", "موقع تعريفي", "صفحة هبوط", "أكثر من نوع"] },
        { id: "mobileOS", label: "إذا تطبيق موبايل: أي نظام تشغيل؟", type: "options",
          options: ["iOS فقط", "Android فقط", "الاثنين"],
          showIf: (a) => a.type === "تطبيق موبايل" },
        { id: "responsive", label: "إذا ويب: نوع التصميم", type: "options",
          options: ["متجاوب (Responsive) لكل الشاشات", "Desktop فقط", "غير منطبق"],
          showIf: (a) => a.type === "ويب أبلكيشن" || a.type === "موقع تعريفي" || a.type === "صفحة هبوط" },
        { id: "rtl", label: "هل فيه نسخة عربي/انجليزي (دعم RTL)؟", type: "options", required: true,
          options: ["نعم، لغتين", "عربي فقط", "انجليزي فقط"] },
      ]
    },
    {
      title: "نطاق العمل، المميزات، والصفحات",
      questions: [
        { id: "features", label: "أهم المميزات المطلوبة", type: "chips", required: true,
          hint: "اختاري كل ما ينطبق، وأضيفي التفاصيل في الملاحظات إذا حبيتي",
          options: ["تسجيل دخول", "سلة شراء", "دفع إلكتروني", "لوحة تحكم", "إشعارات", "بحث وفلترة", "حجز مواعيد", "دردشة/دعم", "تعدد لغات", "أخرى"] },
        { id: "pages", label: "كم عدد الصفحات/الشاشات المتوقعة تقريبًا؟", type: "text" },
        { id: "fromScratch", label: "المشروع من الصفر ولا تجديد لتصميم قديم؟", type: "options", required: true,
          options: ["من الصفر", "تجديد (Redesign)", "دمج بين الاثنين"] },
        { id: "redesignIssue", label: "إذا تجديد: إيش أكبر مشكلة بالتصميم الحالي؟", type: "textarea",
          showIf: (a) => a.fromScratch === "تجديد (Redesign)" },
      ]
    },
    {
      title: "الميزانية والجدول الزمني",
      questions: [
        { id: "budget", label: "نطاق الميزانية التقريبي", type: "text", required: true },
        { id: "deadline", label: "فيه Deadline محدد؟ (تاريخ الإطلاق أو العرض)", type: "text" },
        { id: "comms", label: "تفضيل التواصل أثناء المشروع", type: "options",
          options: ["اجتماعات أسبوعية", "تقارير تقدم مكتوبة", "الاثنين معًا"] },
      ]
    },
  ];

  function App(){
    const [started, setStarted] = React.useState(false);
    const [meta, setMeta] = React.useState({ client: "" });
    const [answers, setAnswers] = React.useState({});
    const [toast, setToast] = React.useState(false);
    const [sending, setSending] = React.useState(false);
    const [sent, setSent] = React.useState(false);
    const [error, setError] = React.useState("");

    React.useEffect(() => {
      fetch(SHEET_WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ type: 'visit' })
      }).catch(() => {});
    }, []);

    function setAnswer(id, val){
      setAnswers(a => ({...a, [id]: val}));
    }
    function toggleChip(id, opt){
      setAnswers(a => {
        const cur = a[id] || [];
        const next = cur.includes(opt) ? cur.filter(o => o !== opt) : [...cur, opt];
        return {...a, [id]: next};
      });
    }

    const totalQ = SECTIONS.reduce((n,s) => n + s.questions.length, 0) + 1;
    let filled = 0;
    if (meta.client) filled++;
    SECTIONS.forEach(s => s.questions.forEach(q => {
      const v = answers[q.id];
      if (Array.isArray(v) ? v.length > 0 : (v && v.trim && v.trim() !== "")) filled++;
    }));
    const pct = Math.round((filled/totalQ)*100);

    function buildText(){
      let out = "استبيان تحديد نطاق المشروع\n";
      out += "================================\n\n";
      out += `العميل/الشركة: ${meta.client || "—"}\n\n`;
      SECTIONS.forEach((s, i) => {
        out += `${i+1}. ${s.title}\n`;
        out += "-".repeat(28) + "\n";
        s.questions.filter(q => !q.showIf || q.showIf(answers)).forEach(q => {
          const v = answers[q.id];
          const vv = Array.isArray(v) ? (v.length ? v.join("، ") : "—") : (v || "—");
          out += `- ${q.label}: ${vv}\n`;
        });
        out += "\n";
      });
      return out;
    }

    function copyOut(){
      const text = buildText();
      navigator.clipboard.writeText(text).then(() => {
        setToast(true);
        setTimeout(() => setToast(false), 2200);
      }).catch(() => {});
    }

    function findMissingRequired(){
      const missing = [];
      if (!meta.client) missing.push("اسم العميل / الشركة");
      SECTIONS.forEach(s => s.questions.forEach(q => {
        if (!q.required) return;
        if (q.showIf && !q.showIf(answers)) return;
        const v = answers[q.id];
        const empty = Array.isArray(v) ? v.length === 0 : (!v || !v.trim());
        if (empty) missing.push(q.label);
      }));
      return missing;
    }

    function resetForm(){
      setMeta({ client: "" });
      setAnswers({});
      setError("");
      setSent(false);
    }

    function sendToSheet(){
      const missing = findMissingRequired();
      if (missing.length > 0) {
        setError("فيه حقول إلزامية ناقصة: " + missing.join("، "));
        return;
      }
      setError("");
      setSending(true);
      const text = buildText();
      fetch(SHEET_WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ type: 'submit', text })
      }).then(() => {
        setSending(false);
        setSent(true);
      }).catch(() => {
        setSending(false);
        setSent(true); // no-cors gives opaque response either way; treat as sent
      });
    }

    function renderQ(q){
      const val = answers[q.id];
      if (q.type === "text") {
        return e('input', {
          type: 'text', value: val || '',
          onChange: ev => setAnswer(q.id, ev.target.value)
        });
      }
      if (q.type === "textarea") {
        return e('textarea', {
          value: val || '',
          onChange: ev => setAnswer(q.id, ev.target.value)
        });
      }
      if (q.type === "options") {
        return e('div', {className: 'options'},
          q.options.map(o => e('div', {
            key: o,
            className: 'opt' + (val === o ? ' sel' : ''),
            onClick: () => setAnswer(q.id, o)
          }, o))
        );
      }
      if (q.type === "chips") {
        const arr = val || [];
        return e('div', {className: 'chips'},
          q.options.map(o => e('div', {
            key: o,
            className: 'chip' + (arr.includes(o) ? ' sel' : ''),
            onClick: () => toggleChip(q.id, o)
          }, o))
        );
      }
      return null;
    }

    if (!started) {
      return e('div', {style:{minHeight: 480, display:'flex', flexDirection:'column'}},
        e('div', {className: 'hero', style:{flex:1}},
          e('div', {className: 'eyebrow'}, 'أهلاً بك'),
          e('h1', null, 'قبل ما نبدأ مشروعك سوا'),
          e('p', null, 'أنا شريفة، مصممة UI/UX. هدفي إني أفهم مشروعك صح من أول خطوة، عشان أقدر أحدد نطاق العمل، الوقت المتوقع، والميزانية بشكل واضح وعادل للطرفين.'),
          e('p', {style:{marginTop:14}}, 'الإجابات اللي بتعبيها بتُستخدم بس لتحديد نطاق المشروع والتواصل معك بخصوصه، وما راح تُشارك مع أي جهة ثانية.'),
          e('p', {style:{marginTop:14, color:'#C9CCE0'}}, 'تاخذ منك ٥ دقائق تقريبًا، وتقدرين تتنقلين بين الأسئلة بحرية.')
        ),
        e('div', {className: 'footer'},
          e('button', {className: 'btn btn-primary', onClick: () => setStarted(true)}, 'ابدأ الاستبيان')
        )
      );
    }

    if (sent) {
      return e('div', {style:{minHeight: 480, display:'flex', flexDirection:'column'}},
        e('div', {className: 'hero', style:{flex:1}},
          e('div', {className: 'eyebrow'}, 'تم بنجاح'),
          e('h1', null, '✓ تم إرسال إجاباتك'),
          e('p', null, 'شكرًا لوقتك! وصلتنا كل التفاصيل، وبنتواصل معك قريبًا لمناقشة نطاق المشروع والخطوة التالية.')
        ),
        e('div', {className: 'footer'},
          e('button', {className: 'btn btn-primary', onClick: resetForm}, 'إرسال إجابات أخرى')
        )
      );
    }

    return e('div', null,
      e('div', {className: 'rail'},
        e('div', {className: 'rail-label'}, `${pct}% مكتمل`),
        e('div', {className: 'rail-track'},
          e('div', {className: 'rail-fill', style: {width: pct + '%'}})
        )
      ),
      e('div', {className: 'hero'},
        e('div', {className: 'eyebrow'}, 'قبل ما نبدأ'),
        e('h1', null, 'استبيان تحديد نطاق المشروع'),
        e('p', null, 'عبّي البيانات التالية عشان نقدر نحدد نطاق العمل، الوقت المتوقع، والميزانية بدقة وشفافية. خذي وقتك، ولا يشترط تعبين كل شي دفعة وحدة.')
      ),
      e('div', {className: 'body-scroll'},
        e('div', {className: 'section'},
          e('div', {className: 'section-head'},
            e('div', {className: 'section-index'}, '٠'),
            e('div', {className: 'section-title'}, 'معلومات أساسية')
          ),
          e('div', {className: 'q'},
            e('label', null, 'اسم العميل / الشركة', e('span', {style:{color:'var(--danger)'}}, ' *')),
            e('input', {type:'text', value: meta.client, onChange: ev => setMeta({...meta, client: ev.target.value})})
          ),
        ),
        SECTIONS.map((s, i) => e('div', {className: 'section', key: i},
          e('div', {className: 'section-head'},
            e('div', {className: 'section-index'}, String(i+1).padStart(2,'٠')),
            e('div', {className: 'section-title'}, s.title)
          ),
          s.questions.filter(q => !q.showIf || q.showIf(answers)).map(q => e('div', {className: 'q', key: q.id},
            e('label', null, q.label, q.required ? e('span', {style:{color:'var(--danger)'}}, ' *') : null),
            q.hint ? e('div', {className: 'hint'}, q.hint) : null,
            renderQ(q)
          ))
        ))
      ),
      e('div', {className: 'footer'},
        e('button', {className: 'btn btn-primary', onClick: sendToSheet, disabled: sending}, sending ? 'جاري الإرسال...' : 'إرسال الإجابات'),
        error && e('div', {style: {color: 'var(--danger)', fontSize: 13, marginTop: 10, textAlign: 'center'}}, error),
      ),
      e('div', {className: 'toast' + (toast ? ' show' : '')}, 'تم نسخ الإجابات ✓')
    );
  }

  ReactDOM.createRoot(document.getElementById('scope-app')).render(e(App));
})();
</script>
</body>
</html>
